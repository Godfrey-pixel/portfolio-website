<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Godfrey Portfolio</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 text-gray-900 flex flex-col min-h-screen">

<!-- NAVBAR -->
<nav class="bg-white shadow-md">
    <div class="max-w-6xl mx-auto px-6 py-4 flex justify-between items-center">

        <!-- BRAND -->
        <h1 class="text-xl font-bold tracking-wide">
            Godfrey Dev
        </h1>

        <!-- LINKS -->
        <div class="space-x-6 text-sm font-medium">

            <a href="/" class="hover:text-blue-600 transition">
                Home
            </a>

            <a href="/about/" class="hover:text-blue-600 transition">
                About
            </a>

            <a href="/services/" class="hover:text-blue-600 transition">
                Services
            </a>

            <a href="{% url 'projects' %}" class="hover:text-blue-600 transition">
                Projects
            </a>

            <a href="/contact/" class="hover:text-blue-600 transition">
                Contact
            </a>

        </div>

    </div>
</nav>

<!-- PAGE CONTENT -->
<main class="flex-grow">
    <div class="max-w-6xl mx-auto px-6 py-10">
        {% block content %}
        {% endblock %}
    </div>
</main>

<!-- FOOTER -->
<footer class="bg-white border-t mt-10">
    <div class="max-w-6xl mx-auto px-6 py-6 text-center text-sm text-gray-600">
        © 2026 Godfrey | Django Developer
    </div>
</footer>

</body>
</html>
